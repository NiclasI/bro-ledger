# Root logger at INFO gates third-party noise; handler ceiling at FINE so our
# package can emit FINE messages without needing any programmatic configuration.
.level=INFO
handlers=java.util.logging.ConsoleHandler

# FINE ceiling — root INFO gate still blocks third-party FINE messages
java.util.logging.ConsoleHandler.level=FINE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%4$s %2$s - %5$s%n

# Our package: FINE, own handler, no parent-handler duplication
se.niclas.broledger.level=FINE
se.niclas.broledger.handlers=java.util.logging.ConsoleHandler
se.niclas.broledger.useParentHandlers=false

se.niclas.broledger.parser.ItemParser.level=INFO
se.niclas.broledger.ui.level=INFO
se.niclas.broledger.ui.MainController.level=INFO